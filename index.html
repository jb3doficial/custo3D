<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="jb3d-build" content="20260715-4">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c1018">
  <title>JB3D Cost Studio</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <style>
    :root{
      color-scheme:dark;
      --bg:#080c13;
      --panel:#111925;
      --line:#29364a;
      --text:#eef3f9;
      --muted:#728096;
      --accent:#7468f7;
      --accent2:#32c7f2;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0}
    body{
      display:grid;
      place-items:center;
      padding:24px;
      overflow:hidden;
      color:var(--text);
      font-family:"Segoe UI Variable","Segoe UI",system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(circle at 12% 0,rgba(116,104,247,.18),transparent 32%),
        radial-gradient(circle at 90% 100%,rgba(50,199,242,.10),transparent 28%),
        var(--bg);
    }
    .loader{
      width:min(440px,100%);
      padding:28px;
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(17,25,37,.94);
      box-shadow:0 28px 80px rgba(0,0,0,.42);
      text-align:center;
    }
    .logo{
      display:grid;
      width:62px;
      height:62px;
      margin:0 auto 16px;
      place-items:center;
      border:1px solid rgba(50,199,242,.28);
      border-radius:17px;
      background:linear-gradient(145deg,var(--accent),var(--accent2));
      box-shadow:0 14px 32px rgba(80,95,235,.28);
    }
    .logo svg{width:34px;height:34px}
    h1{margin:0;font-size:1.2rem;letter-spacing:-.025em}
    p{margin:8px 0 0;color:var(--muted);font-size:.77rem;line-height:1.5}
    .progress{
      height:7px;
      margin-top:22px;
      overflow:hidden;
      border-radius:999px;
      background:#263246;
    }
    .progress span{
      display:block;
      width:38%;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      animation:loading 1.05s ease-in-out infinite;
    }
    @keyframes loading{
      from{transform:translateX(-110%)}
      to{transform:translateX(340%)}
    }
    .manual{
      display:none;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-top:18px;
    }
    .manual.show{display:grid}
    .manual a{
      display:flex;
      min-height:43px;
      align-items:center;
      justify-content:center;
      border:1px solid #304057;
      border-radius:10px;
      color:#c3ccda;
      background:#182130;
      font-size:.68rem;
      font-weight:800;
      text-decoration:none;
    }
    .manual a:first-child{
      border-color:transparent;
      color:white;
      background:linear-gradient(135deg,var(--accent),#536ff1 58%,var(--accent2));
    }
  </style>
</head>
<body>
  <main class="loader">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2.8 20 7.2v9.6L12 21.2 4 16.8V7.2L12 2.8Z" stroke="white" stroke-width="1.7"/>
        <path d="m4.4 7.4 7.6 4.2 7.6-4.2M12 11.6v9" stroke="white" stroke-width="1.7"/>
      </svg>
    </div>
    <h1>JB3D Cost Studio</h1>
    <p id="statusText">Identificando o dispositivo e preparando a interface correta...</p>
    <div class="progress"><span></span></div>

    <div class="manual" id="manualChoice">
      <a href="./mobile.html">Abrir no celular</a>
      <a href="./desktop.html">Abrir no computador</a>
    </div>
  </main>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const forcedView = params.get('view');
      const hash = location.hash || '';

      const isMobileUserAgent =
        /Android|iPhone|iPod|Windows Phone|Mobile|BlackBerry|Opera Mini/i.test(navigator.userAgent);

      const isIPad =
        /iPad/i.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      const coarsePointer = matchMedia('(pointer: coarse)').matches;
      const noHover = matchMedia('(hover: none)').matches;
      const compactScreen = Math.min(screen.width, screen.height) <= 900;
      const narrowViewport = innerWidth <= 860;

      let target;
      if (forcedView === 'mobile') {
        target = './mobile.html';
      } else if (forcedView === 'desktop') {
        target = './desktop.html';
      } else {
        const mobileDevice =
          isMobileUserAgent ||
          isIPad ||
          (coarsePointer && noHover) ||
          (coarsePointer && compactScreen) ||
          narrowViewport;

        target = mobileDevice ? './mobile.html' : './desktop.html';
      }

      try {
        // Remove service workers e caches de versões antigas antes de encaminhar.
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
        }
      } catch (error) {}

      document.getElementById('statusText').textContent =
        target.includes('mobile')
          ? 'Celular detectado. Abrindo a interface mobile...'
          : 'Computador detectado. Abrindo a interface desktop...';

      const versionedTarget =
        `${target}?v=20260715-4${hash}`;
      setTimeout(() => location.replace(versionedTarget), 180);

      // Fallback caso algum navegador bloqueie o redirecionamento.
      setTimeout(() => {
        document.getElementById('manualChoice').classList.add('show');
      }, 1800);
    })();
  </script>
</body>
</html>
